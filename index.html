<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Digital-Mobil DE | Инструменты PDF и Помощь в NRW</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        .top-bar { padding: 10px 0; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.2); }
        .top-bar-content { display: flex; justify-content: space-between; align-items: center; }
        
        .date-time-block { display: flex; flex-direction: column; line-height: 1.2; font-weight: bold; min-width: 80px; }
        #current-time { font-size: 0.8rem; color: #00529b; opacity: 0.8; }
        
        /* Единая полоска погоды */
        .weather-info { 
            display: flex; 
            flex-wrap: nowrap; 
            overflow-x: auto; 
            gap: 12px; 
            font-size: 0.85rem; 
            align-items: center;
        }
        .w-item { white-space: nowrap; font-weight: 500; display: flex; align-items: center; gap: 4px; }
        .divider { color: rgba(0,0,0,0.2); margin: 0 2px; }

        .news-item { background: rgba(255, 255, 255, 0.4); border-left: 4px solid #00529b; padding: 12px; margin-bottom: 15px; border-radius: 0 12px 12px 0; }
        .news-title { font-weight: bold; font-size: 0.95rem; display: block; margin-bottom: 5px; color: #1d1d1f; text-decoration: none; }
        .iframe-wrapper { height: 700px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); background: #fff; }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
            margin: 15px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
        }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; }
            .weather-info { font-size: 0.78rem; gap: 8px; }
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="container top-bar-content">
            <div class="date-time-block">
                <span id="current-date"></span>
                <span id="current-time"></span>
            </div>

            <div class="weather-scroll-container">
                <div class="weather-info" id="full-weather-bar">
                    <span class="w-item" id="city-temp">Laden...</span>
                    <span class="divider">|</span>
                    <span class="w-item">💧 <span id="hum">--</span>%</span>
                    <span class="divider">|</span>
                    <span class="w-item">⏲️ <span id="press">--</span> mmHg</span>
                    <span class="divider">|</span>
                    <span class="w-item">🧲 Kp-Index: <span id="geo">2</span> Punkte</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <button class="nav-btn active" onclick="showTab('home', event)">Главная</button>
            <button class="nav-btn" onclick="showTab('img2pdf', event)">Фото в PDF</button>
            <button class="nav-btn" onclick="showTab('pdf', event)">PDF Сжатие</button>
            <button class="nav-btn" onclick="showTab('news', event)">Новости DE</button>
            <button class="nav-btn" onclick="showTab('security', event)">Безопасность</button>
            <button class="nav-btn" onclick="showTab('mobile', event)">Транспорт</button>
            <button class="nav-btn" onclick="showTab('about', event)">Инфо</button>
        </div>
    </nav>

    <main class="container">
        
        <section id="home" class="tab-content active">
            <div class="card hero-card">
                <h1>Willkommen! 🇩🇪</h1>
                <p>Ваш персональный гид по цифровой экосистеме Германии.</p>
                
                <div class="video-wrapper">
                    <iframe 
                        src="https://www.youtube.com/embed/videoseries?list=UUup5WcJANJgdNLL_ek3qyUw&amp;rel=0"
                        title="Misha Bur News"
                        allowfullscreen>
                    </iframe>
                </div>

                <div style="display: grid; gap: 10px; margin-top: 15px;">
                    <button class="btn-main" onclick="showTab('img2pdf', event)">🖼️ Создать PDF из фото</button>
                    <button class="btn-main" style="background: #007aff;" onclick="showTab('news', event)">Читать текстовые новости</button>
                </div>
            </div>
        </section>

        <section id="img2pdf" class="tab-content">
            <div class="card">
                <h2>🖼️ Создать PDF из фото</h2>
                <div class="iframe-wrapper">
                    <iframe src="https://photo-to-pdf-converter-efhy6yri2rkf4g5wnhbwqm.streamlit.app/?embed=true"></iframe>
                </div>
            </div>
        </section>

        <section id="pdf" class="tab-content">
            <div class="card">
                <h2>📄 PDF Compressor</h2>
                <div class="iframe-wrapper">
                    <iframe src="https://pdf-compressor-web.onrender.com" allow="downloads" sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads"></iframe>
                </div>
            </div>
        </section>

        <section id="news" class="tab-content">
            <div class="card">
                <h2>🗞️ Последние события</h2>
                <div id="news-container"><p class="status-msg">Wird geladen...</p></div>
            </div>
        </section>

        <section id="about" class="tab-content">
            <div class="card">
                <h2>ℹ️ О проекте</h2>
                <p>Digital-Mobil DE — вспомогательный ресурс для жителей Германии.</p>
            </div>
        </section>

    </main>

    <script>
    const apiKey = '9057c4b98fd893160015f5d4bc3696cc';

    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('current-time').innerText = timeStr;
    }

    async function getWeather() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    // lang=de для немецких названий городов
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=${apiKey}&units=metric&lang=de`);
                    const d = await res.json();
                    if (d.main) {
                        const temp = Math.round(d.main.temp);
                        const city = d.name;
                        const code = d.weather[0].id;
                        let icon = '☁️';
                        if (code === 800) icon = '☀️';
                        else if (code > 800) icon = '☁️';
                        else if (code >= 600) icon = '❄️';
                        else if (code >= 300) icon = '🌧️';

                        // Вывод Город + Температура
                        document.getElementById('city-temp').innerText = `${city} ${icon} ${temp}°C`;
                        // Давление в mmHg (немецкий стандарт mmHg)
                        document.getElementById('press').innerText = Math.round(d.main.pressure * 0.75006);
                        // Влажность
                        document.getElementById('hum').innerText = d.main.humidity;
                    }
                } catch (e) { console.error(e); }
            });
        }
    }

    async function loadNews() {
        const container = document.getElementById('news-container');
        const rssUrl = 'https://www.tagesschau.de/infoservices/alle-meldungen-100~rss2.xml';
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
        try {
            const res = await fetch(apiUrl);
            const data = await res.json();
            if (data.status === 'ok') {
                container.innerHTML = '';
                data.items.slice(0, 5).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `<a href="${item.link}" target="_blank" class="news-title">${item.title}</a><p class="news-desc">${item.description.split('.')[0]}...</p>`;
                    container.appendChild(div);
                });
            }
        } catch (e) { container.innerHTML = 'Fehler beim Laden.'; }
    }

    function showTab(tabId, event) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if (event && event.currentTarget) event.currentTarget.classList.add('active');
        window.scrollTo(0,0);
    }

    window.onload = function() {
        getWeather();
        loadNews();
        const options = { day: 'numeric', month: 'long' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('de-DE', options);
        updateClock();
        setInterval(updateClock, 1000);
    };
    </script>

</body>
</html>
