<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital-Mobil DE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <div class="container top-bar-content">
            <div class="date-time-block">
                <span id="current-date"></span>
                <span id="current-time"></span>
            </div>
            <div class="weather-scroll-container">
                <div class="w-item" id="full-weather">Laden...</div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <button class="nav-btn active" onclick="showTab('home', event)">Главная</button>
            <button class="nav-btn" onclick="showTab('img2pdf', event)">Фото в PDF</button>
            <button class="nav-btn" onclick="showTab('news', event)">Новости DE</button>
            <button class="nav-btn" onclick="showTab('about', event)">Инфо</button>
        </div>
    </nav>

    <main class="container">
        <section id="home" class="tab-content active">
            <div class="card">
                <h1>Willkommen! 🇩🇪</h1>
                <p>Ваш цифровой помощник в Германии.</p>
            </div>
        </section>

        <section id="img2pdf" class="tab-content">
            <div class="card">
                <h2>🖼️ Фото в PDF</h2>
                <div class="iframe-wrapper">
                    <iframe src="https://photo-to-pdf-converter-efhy6yri2rkf4g5wnhbwqm.streamlit.app/?embed=true"></iframe>
                </div>
            </div>
        </section>
    </main>

    <script>
    const apiKey = '9057c4b98fd893160015f5d4bc3696cc';

    async function getWeather() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=${apiKey}&units=metric&lang=de`);
                    const d = await res.json();
                    if (d.main) {
                        const temp = Math.round(d.main.temp);
                        const city = d.name;
                        const hum = d.main.humidity;
                        const press = Math.round(d.main.pressure * 0.75006);
                        
                        // &nbsp; - это принудительный пробел. 5 штук создадут большой отступ.
                        const sp = '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'; 
                        const divider = '<span style="opacity:0.2">|</span>';

                        const weatherStr = `${city} ${temp}°C ${sp}${divider}${sp}💧 ${hum}% ${sp}${divider}${sp}⏲️ ${press}mmHg ${sp}${divider}${sp}🧲 Kp-Index: 2 Punkte`;
                        
                        // Используем innerHTML для обработки &nbsp;
                        document.getElementById('full-weather').innerHTML = weatherStr;
                    }
                } catch (e) { console.error(e); }
            });
        }
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleTimeString('de-DE');
    }

    function showTab(tabId, event) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if (event) event.currentTarget.classList.add('active');
        window.scrollTo(0,0);
    }

    window.onload = function() {
        getWeather();
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('de-DE', {day:'numeric', month:'long'});
        updateClock();
        setInterval(updateClock, 1000);
    };
    </script>
</body>
</html>
