        /* Базовые стили для видео и iframe (можно перенести в style.css) */
        .video-wrapper, .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            margin: 15px 0;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        
        .video-wrapper iframe, .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .btn-main {
