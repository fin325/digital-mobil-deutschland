<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Digital-Mobil DE | Инструменты PDF и Помощь в NRW</title>
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Фиксированный фон */
        body {
            margin: 0;
            padding: 0;
            background: url('img/a9bcb0c3-65ff-4500-8ff8-922a50c280c4.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .top-bar { 
            padding: 12px 0; 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            position: sticky;
            top: 0;
            z-index: 1100;
        }
        .top-bar-content { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 15px;
        }
        
        /* Блок Даты и Времени */
        .date-time-block { 
            display: flex; 
            flex-direction: column; 
            line-height: 1.1; 
            min-width: 90px;
        }
        #current-date { 
            font-size: 0.7rem; 
            color: #1d1d1f; 
            opacity: 0.6; 
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        #current-time { 
            font-size: 1.2rem; 
            font-weight: 800;
            background: linear-gradient(135deg, #00529b, #007aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0, 82, 155, 0.2));
        }

        /* Кнопки переключения языка */
        .lang-switch { display: flex; gap: 5px; margin-left: 10px; }
        .lang-btn { 
            background: rgba(255,255,255,0.3); border: 1px solid #00529b; 
            border-radius: 6px; padding: 3px 8px; cursor: pointer; 
            font-size: 0.75rem; font-weight: bold; color: #00529b;
        }
        .lang-btn.active { background: #00529b; color: white; }
        
        .weather-info { 
            display: flex; 
            flex-wrap: nowrap; 
            overflow-x: auto; 
            gap: 12px; 
            font-size: 0.85rem; 
            align-items: center; 
        }
        .weather-info::-webkit-scrollbar { display: none; }

        .w-item { 
            white-space: nowrap; 
            font-weight: 500; 
            display: flex; 
            align-items: center; 
            gap: 4px; 
            background: rgba(255,255,255,0.2); 
            padding: 4px 8px; 
            border-radius: 10px; 
        }

        .site-title {
            text-align: center;
            color: #f0f8ff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4), 0 0 15px rgba(100, 180, 255, 0.5);
            margin: 10px 0 6px 0;
            font-size: 1.55rem;
            font-weight: 700;
        }
        
        .site-subtitle {
            text-align: center;
            color: #e6f0ff;
            font-size: 1.05rem;
            font-weight: 500;
            margin: 0 0 10px 0;
        }

        .card { 
            background: rgba(255, 255, 255, 0.2) !important; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 28px; 
            padding: 25px; 
            margin-bottom: 20px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 18px;
            border-radius: 14px;
            white-space: nowrap;
            color: #00529b;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-btn.active { background: #00529b; color: white; }

        .btn-main {
            background: linear-gradient(135deg, #00529b, #007aff) !important;
            border: none !important;
            color: white;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 18px;
            width: 100%;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .site-title { font-size: 1.35rem; }
            .site-subtitle { font-size: 0.95rem; }
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="container top-bar-content">
            <div class="date-time-block">
                <span id="current-date"></span>
                <span id="current-time"></span>
            </div>

            <div class="weather-scroll-container">
                <div class="weather-info" id="full-weather-bar">
                    <span class="w-item" id="city-temp">Laden...</span>
                    <span class="w-item">💧 <span id="hum">--</span>%</span>
                    <span class="w-item">🧲 Kp: <span id="geo">2</span></span>
                </div>
            </div>

            <div class="lang-switch">
                <button class="lang-btn active" onclick="changeLanguage('ru')" id="btn-ru">RU</button>
                <button class="lang-btn" onclick="changeLanguage('de')" id="btn-de">DE</button>
            </div>
        </div>

        <div class="site-title">Digital & Mobil in Deutschland</div>
        <div class="site-subtitle" data-i18n="subtitle">Stadt Hattingen</div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <button class="nav-btn active" onclick="showTab('home', event)" data-i18n="nav_home">Главная</button>
            <button class="nav-btn" onclick="showTab('img2pdf', event)" data-i18n="nav_img2pdf">Фото в PDF</button>
            <button class="nav-btn" onclick="showTab('pdf', event)" data-i18n="nav_pdf">PDF Сжатие</button>
            <button class="nav-btn" onclick="showTab('news', event)" data-i18n="nav_news">Новости DE</button>
            <button class="nav-btn" onclick="showTab('security', event)" data-i18n="nav_security">Безопасность</button>
            <button class="nav-btn" onclick="showTab('mobile', event)" data-i18n="nav_mobile">Транспорт</button>
            <button class="nav-btn" onclick="showTab('about', event)" data-i18n="nav_about">Инфо</button>
        </div>
    </nav>

    <main class="container">
        
        <section id="home" class="tab-content active">
            <div class="card hero-card">
                <h1 data-i18n="welcome_h1">Willkommen! 🇩🇪</h1>
                <p data-i18n="welcome_p">Ваш персональный гид по цифровой экосистеме Германии.</p>
                
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/j7wLBpAhn_g?rel=0" allowfullscreen></iframe>
                </div>

                <div style="display: grid; gap: 10px; margin-top: 15px;">
                    <button class="btn-main" onclick="showTab('img2pdf', event)" data-i18n="btn_pdf">🖼️ Создать PDF из фото</button>
                </div>
            </div>
        </section>

        <section id="img2pdf" class="tab-content">
            <div class="card">
                <h2 data-i18n="nav_img2pdf">🖼️ Создать PDF из фото</h2>
                <div class="iframe-wrapper">
                    <iframe src="https://photo-to-pdf-converter-efhy6yri2rkf4g5wnhbwqm.streamlit.app/?embed=true"></iframe>
                </div>
            </div>
        </section>

        <section id="pdf" class="tab-content"><div class="card"><h2 data-i18n="nav_pdf">📄 PDF Compressor</h2></div></section>
        <section id="news" class="tab-content"><div class="card"><h2 data-i18n="nav_news">🗞️ Последние события</h2><div id="news-container"></div></div></section>

    </main>

    <script>
    const apiKey = '9057c4b98fd893160015f5d4bc3696cc';

    const translations = {
        ru: {
            subtitle: "Город Хаттинген", nav_home: "Главная", nav_img2pdf: "Фото в PDF", nav_pdf: "PDF Сжатие",
            nav_news: "Новости DE", nav_security: "Безопасность", nav_mobile: "Транспорт", nav_about: "Инфо",
            welcome_h1: "Willkommen! 🇩🇪", welcome_p: "Ваш персональный гид по цифровой экосистеме Германии.",
            btn_pdf: "🖼️ Создать PDF из фото"
        },
        de: {
            subtitle: "Stadt Hattingen", nav_home: "Startseite", nav_img2pdf: "Foto zu PDF", nav_pdf: "PDF Kompression",
            nav_news: "Nachrichten", nav_security: "Sicherheit", nav_mobile: "Verkehr", nav_about: "Info",
            welcome_h1: "Willkommen! 🇩🇪", welcome_p: "Ihr persönlicher Leitfaden für das digitale Deutschland.",
            btn_pdf: "🖼️ PDF aus Fotos erstellen"
        }
    };

    function changeLanguage(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[lang][key]) el.innerText = translations[lang][key];
        });
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    async function getWeather() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&appid=${apiKey}&units=metric&lang=de`);
                    const d = await res.json();
                    if (d.main) {
                        document.getElementById('city-temp').innerText = `${d.name} ${Math.round(d.main.temp)}°C`;
                        document.getElementById('hum').innerText = d.main.humidity;
                    }
                } catch (e) { console.error(e); }
            });
        }
    }

    function showTab(tabId, event) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        if (event) event.currentTarget.classList.add('active');
        window.scrollTo(0,0);
    }

    window.onload = function() {
        getWeather();
        updateClock();
        setInterval(updateClock, 1000);
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
    };
    </script>
</body>
</html>
